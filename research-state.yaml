project:
  title: "Calibration-Guided Precision Assignment for Stable LoRA Fine-Tuning"
  question: "Before LoRA fine-tuning, can a short precision check identify which model modules are precision-sensitive, so a frozen mixed-precision policy can match bf16 validation quality while saving resources or expanding the stable fine-tuning envelope?"
  status: active
  started: "2026-05-13"
  domain: "mixed precision LLM fine-tuning"

literature:
  key_papers:
    - id: "micikevicius2017mixed"
      title: "Mixed Precision Training"
      authors: "Micikevicius et al."
      year: 2017
      relevance: "Foundational FP16 mixed-precision recipe: low-precision tensors plus FP32 master weights and loss scaling."
      summary: "literature/mixed_precision_training_2017.md"
      url: "https://arxiv.org/abs/1710.03740"
    - id: "kalamkar2019bfloat16"
      title: "A Study of BFLOAT16 for Deep Learning Training"
      authors: "Kalamkar et al."
      year: 2019
      relevance: "Explains why BF16 is a strong baseline because it preserves FP32-like exponent range."
      summary: "literature/bfloat16_training_2019.md"
      url: "https://arxiv.org/abs/1905.12322"
    - id: "micikevicius2022fp8"
      title: "FP8 Formats for Deep Learning"
      authors: "Micikevicius et al."
      year: 2022
      relevance: "Defines FP8 format tradeoffs and motivates role-specific precision assignment."
      summary: "literature/fp8_formats_2022.md"
      url: "https://arxiv.org/abs/2209.05433"
    - id: "peng2023fp8lm"
      title: "FP8-LM: Training FP8 Large Language Models"
      authors: "Peng et al."
      year: 2023
      relevance: "LLM-specific FP8 mixed-precision framework covering gradients, optimizer states, and distributed training."
      summary: "literature/fp8_lm_2023.md"
      url: "https://arxiv.org/abs/2310.18313"
    - id: "lee2024fp8stability"
      title: "To FP8 and Back Again: Quantifying Reduced Precision Effects on LLM Training Stability"
      authors: "Lee et al."
      year: 2024
      relevance: "Frames reduced precision as a stability and sensitivity problem, not only a final-quality problem."
      summary: "literature/to_fp8_and_back_2024.md"
      url: "https://arxiv.org/abs/2405.18710"
    - id: "ozkara2025stochastic"
      title: "Stochastic Rounding for LLM Training: Theory and Practice"
      authors: "Ozkara et al."
      year: 2025
      relevance: "Shows rounding behavior and optimizer interaction as important mixed-precision design dimensions."
      summary: "literature/stochastic_rounding_llm_training_2025.md"
      url: "https://arxiv.org/abs/2502.20566"
    - id: "hu2021lora"
      title: "LoRA: Low-Rank Adaptation of Large Language Models"
      authors: "Hu et al."
      year: 2021
      relevance: "Defines the adapter fine-tuning regime used in H1."
      summary: "literature/lora_2021.md"
      url: "https://arxiv.org/abs/2106.09685"
    - id: "dettmers2023qlora"
      title: "QLoRA: Efficient Finetuning of Quantized LLMs"
      authors: "Dettmers et al."
      year: 2023
      relevance: "Nearby low-resource LoRA fine-tuning work; included for context but not treated as the main focus."
      summary: "literature/qlora_2023.md"
      url: "https://arxiv.org/abs/2305.14314"
    - id: "zhang2019rmsnorm"
      title: "Root Mean Square Layer Normalization"
      authors: "Zhang and Sennrich"
      year: 2019
      relevance: "Explains the RMSNorm operation targeted by fp32-norm precision islands."
      summary: "literature/rmsnorm_2019.md"
      url: "https://arxiv.org/abs/1910.07467"
    - id: "dettmers2022llmint8"
      title: "LLM.int8(): 8-bit Matrix Multiplication for Transformers at Scale"
      authors: "Dettmers et al."
      year: 2022
      relevance: "Shows activation-outlier-driven mixed INT8/16-bit inference for LLMs."
      summary: "literature/llm_int8_2022.md"
      url: "https://arxiv.org/abs/2208.07339"
    - id: "xiao2022smoothquant"
      title: "SmoothQuant: Accurate and Efficient Post-Training Quantization for Large Language Models"
      authors: "Xiao et al."
      year: 2022
      relevance: "Uses activation statistics to enable W8A8 INT8 LLM inference by smoothing outliers."
      summary: "literature/smoothquant_2022.md"
      url: "https://arxiv.org/abs/2211.10438"
    - id: "yao2022zeroquant"
      title: "ZeroQuant: Efficient and Affordable Post-Training Quantization for Large-Scale Transformers"
      authors: "Yao et al."
      year: 2022
      relevance: "Demonstrates module-aware INT8 and mixed INT4/INT8 Transformer inference policies."
      summary: "literature/zeroquant_2022.md"
      url: "https://arxiv.org/abs/2206.01861"
    - id: "dong2019hawq"
      title: "HAWQ: Hessian AWare Quantization of Neural Networks with Mixed-Precision"
      authors: "Dong et al."
      year: 2019
      relevance: "Introduces sensitivity-driven mixed-precision layer assignment using Hessian information."
      summary: "literature/hawq_2019.md"
      url: "https://arxiv.org/abs/1905.03696"
    - id: "yao2021hawqv3"
      title: "HAWQ-V3: Dyadic Neural Network Quantization"
      authors: "Yao et al."
      year: 2021
      relevance: "Frames mixed INT4/INT8 precision assignment as constrained optimization over quality and hardware cost."
      summary: "literature/hawq_v3_2021.md"
      url: "https://arxiv.org/abs/2011.10680"
    - id: "kummer2021adapt"
      title: "Adaptive Precision Training (AdaPT)"
      authors: "Kummer et al."
      year: 2021
      relevance: "Studies dynamic precision assignment during training rather than only post-training inference."
      summary: "literature/adapt_adaptive_precision_training_2021.md"
      url: "https://arxiv.org/abs/2107.13490"
    - id: "dai2025convergence"
      title: "Convergence-aware operator-wise mixed-precision training"
      authors: "Dai et al."
      year: 2025
      relevance: "Connects operator-wise precision assignment to convergence preservation."
      summary: "literature/convergence_aware_operatorwise_mixed_precision_2025.md"
      url: "https://link.springer.com/article/10.1007/s42514-024-00208-9"
    - id: "chmiel2025fp4"
      title: "FP4 All the Way: Fully Quantized Training of LLMs"
      authors: "Chmiel et al."
      year: 2025
      relevance: "Identifies FP4 LLM training design choices and gradient-norm-versus-quantization-noise stability thresholds."
      summary: "literature/fp4_all_the_way_2025.md"
      url: "https://arxiv.org/abs/2505.19115"
    - id: "pan2026snip"
      title: "SNIP: An Adaptive Mixed Precision Framework for Subbyte Large Language Model Training"
      authors: "Pan et al."
      year: 2026
      relevance: "Closest match to H6: uses activation, gradient, and optimizer statistics to optimize subbyte LLM precision."
      summary: "literature/snip_adaptive_subbyte_llm_training_2026.md"
      url: "https://arxiv.org/abs/2602.01410"
    - id: "zhang2026attnqat"
      title: "Attn-QAT: 4-Bit Attention With Quantization-Aware Training"
      authors: "Zhang et al."
      year: 2026
      relevance: "Shows attention can be a high-risk FP4 region because of heavy-tailed activations and backward precision assumptions."
      summary: "literature/attn_qat_2026.md"
      url: "https://arxiv.org/abs/2603.00040"
    - id: "ma2024bitnet"
      title: "The Era of 1-bit LLMs: All Large Language Models are in 1.58 Bits"
      authors: "Ma et al."
      year: 2024
      relevance: "Boundary context for native low-bit LLMs; useful contrast with post-hoc adaptive precision assignment."
      summary: "literature/bitnet_b158_2024.md"
      url: "https://arxiv.org/abs/2402.17764"
  open_problems:
    - "Framework autocast policies are often implicit; project-level dtype probes are needed to verify which LLM modules actually compute at BF16, FP32, TF32, FP16, or FP8."
    - "The literature does not isolate RMSNorm/LayerNorm dtype during small LoRA fine-tuning, despite normalization being a plausible precision-sensitive operation."
    - "Reduced-precision LLM work increasingly emphasizes stability, but there is no standard cheap stability benchmark for limited-GPU LoRA pilots."
    - "Precision islands may matter only under stressed regimes such as high learning rate, long context, tiny batch size, FP16, FP8, or noisy data."
    - "Module boundary dtype may not reveal internal accumulator dtype, especially for fused kernels or custom normalization implementations."
    - "Static precision recipes do not explain how to choose per-module or per-operation precision from observed stability signals during a run."
    - "There is no project-local policy yet for promoting sensitive operations to higher precision or demoting stable operations to lower precision based on activation, gradient, clipping, and loss-delta diagnostics."
    - "Existing adaptive precision papers either target non-LLM networks, full LLM pretraining, or inference, leaving LoRA fine-tuning transfer uncertain."
    - "Attention appears high-risk for INT4/FP4 because of heavy-tailed activations and backward-pass precision assumptions, but no lightweight LoRA-specific test exists yet."
    - "Hardware-realistic low-bit benefits require matching kernels; fake quantization can reveal sensitivity but may not predict throughput or memory wins."
    - "It remains unclear whether a short pre-training calibration pass can predict training-time precision sensitivity well enough to guide a useful frozen policy."
  evidence_gaps:
    - "H1 now has a matched seed-42 1,000-step baseline/treatment comparison. fp32_norms improves validation NLL by only 0.00425 absolute (about 0.20%) with no stability events in either run, so the result is inconclusive under the locked 1% decision rule."
    - "H5 resolved the main RMSNorm implementation question for the installed Qwen2RMSNorm source: its forward path casts hidden_states to float32 before pow/mean/rsqrt. The H5 run itself executed on CPU because CUDA was unavailable at probe time, but this source-level finding combines with the earlier CUDA boundary probe to suggest baseline bf16 boundaries do not imply bf16 RMSNorm reduction arithmetic."
    - "A three-seed bf16 baseline estimate exists, but matched fp32_norms runs are available only for seed 42. The bf16 baseline seed spread is larger than the seed-42 fp32_norms delta."
    - "No stressed setting has been tested, so the pilot may miss precision effects that only appear near instability."
    - "No comparison exists yet for other precision islands such as fp32 logits/loss, attention softmax, optimizer states, or stochastic rounding."
    - "No run-to-run variance estimate is available."
    - "Per-module activation outlier and quantization-error traces now exist for H6, but gradient spike traces and update-divergence probes are still missing."
    - "The H6 Stage 1 bf16 calibration pass now measures activation outliers and fake-quantization error across 218 modules for seeds 42, 43, and 44. Stage 2 one-island perturbation probes now test a selected module panel across the same three seeds."
    - "The first adaptive precision policy has been tested against matched static bf16 policies for 500 steps on seeds 42, 43, and 44. It preserved validation quality and stability but did not improve resource cost under Python-level fake quantization."
    - "Evidence now shows that LLM.int8/SmoothQuant-style activation outlier signals predict forward perturbation sensitivity for MLP projection outputs in this LoRA setting. It does not yet prove training-time update sensitivity."
    - "The current H6 fake-int8 path is an emulation for sensitivity testing and is slower than bf16. A hardware-realistic low-precision implementation is still needed before any resource-saving claim."
    - "The central H6 idea is now simplified to a quick precision check before training: measure module sensitivity, freeze a policy, then compare against bf16. Signal-only, perturbation, and first frozen-policy training artifacts now exist."

hypotheses:
  - id: H1
    statement: "Keeping normalization layers in fp32 during bf16 LoRA fine-tuning will reduce instability and improve or preserve validation loss relative to a standard bf16 autocast baseline, with less than 10% throughput overhead."
    status: inconclusive_seed42
    motivation: "RMSNorm/LayerNorm compute statistics over activations and may be more numerically sensitive than most matrix multiplications; they are small enough that fp32 execution may cost little."
    why_it_matters: "The literature frames mixed precision as a dtype-placement problem, and the project dtype probe showed Qwen RMSNorm module boundaries remain bf16 under the baseline. If norms matter, this is a cheap precision island with low implementation cost."
    expected_result: "fp32_norms has lower validation NLL or fewer loss/gradient spikes than bf16_baseline, with less than 10% throughput overhead. Seed 42 did not meet this bar: validation NLL improved by about 0.20%, neither run had loss spikes or NaN/Inf events, throughput overhead was about 0.83%, and the result is below the locked 1% support threshold."
    required_experiment: "Run the existing H1 baseline and fp32_norms LoRA scripts for 1,000 optimizer steps on Qwen/Qwen2.5-0.5B and tatsu-lab/alpaca after the dtype probe, using matched seed, dataset split, LoRA targets, batch size, and learning rate."
    metric: "Primary: held-out validation NLL after 1,000 steps. Secondary: loss-spike count, NaN/Inf count, max grad norm, peak CUDA memory, tokens/sec, and throughput overhead."
    estimated_compute_cost: "About 2.5 GPU-hours for one baseline/treatment pair at the observed smoke speed, plus roughly 7.5 GPU-hours for a 3-seed confirmation."
    risk: "BF16 may already be stable enough that no effect appears; the current dtype probe verifies boundary dtypes but not internal RMSNorm accumulator dtype."
    parent: null
    priority: high
  - id: H2
    statement: "Keeping logits and loss computation in fp32 during bf16 LoRA fine-tuning will reduce numerical instability more than fp32 normalization alone, especially by lowering loss spikes without materially changing throughput."
    status: pending
    role_for_H6: "conditional_static_island_ablation"
    motivation: "The survey identifies loss computation as a plausible precision-sensitive operation. Cross-entropy involves logits, exponentials/log-sum-exp behavior, and small probability differences, so it may be more sensitive than RMSNorm under BF16."
    why_it_matters: "If fp32 norms do not help, the next likely precision island is the model output/loss path. This tests whether stability is limited near the objective rather than inside Transformer blocks."
    expected_result: "fp32 logits/loss matches or improves validation NLL and reduces spike count compared with bf16_baseline, with negligible memory overhead and small throughput overhead."
    required_experiment: "Add a precision policy that casts logits to fp32 and computes the language modeling loss outside autocast, then compare against bf16_baseline and H1 fp32_norms under the same 1,000-step LoRA setup."
    metric: "Validation NLL, train loss-spike count, NaN/Inf count, max grad norm, tokens/sec, and peak CUDA memory."
    estimated_compute_cost: "About 1.25 GPU-hours per 1,000-step run; about 3.75 GPU-hours for a 3-seed follow-up if the first run shows signal."
    risk: "Transformers may already compute some loss internals in fp32, making the intervention smaller than expected; final-loss differences may be below seed noise."
    parent: null
    priority: high
  - id: H3
    statement: "Selective fp32 precision islands will matter more in a stressed fine-tuning regime than in the default stable BF16 LoRA regime."
    status: pending
    role_for_H6: "conditional_stress_test"
    motivation: "The literature and survey suggest reduced-precision failures may be regime-dependent, appearing under high learning rate, long context, small batch size, FP16, or other near-instability conditions."
    why_it_matters: "A null result under the default recipe would not necessarily refute precision islands. Stress testing can reveal whether they expand the safe operating envelope."
    expected_result: "Under a mild stress condition such as 2x learning rate or longer sequence length, bf16_baseline shows more loss spikes or worse validation NLL, while fp32_norms or fp32 logits/loss reduces the instability."
    required_experiment: "Run a small stress matrix after H1: bf16_baseline versus the best precision island at baseline learning rate and 2x learning rate, optionally repeating with longer sequence length if memory allows."
    metric: "Instability threshold measured by loss-spike count, NaN/Inf count, max grad norm, completion rate, validation NLL, and throughput."
    estimated_compute_cost: "About 5 GPU-hours for a 2-policy x 2-learning-rate matrix at 1,000 steps each; halve the budget with 500-step exploratory runs."
    risk: "Stress may be too mild to reveal differences or too strong for all policies to fail; careful calibration may consume pilot time."
    parent: null
    priority: medium
  - id: H4
    statement: "Single-seed smoke results will overstate certainty; run-to-run variance will be comparable to or larger than the effect size of fp32_norms in the default BF16 LoRA setting."
    status: pending
    role_for_H6: "validation_ablation_after_policy_exists"
    motivation: "Recent reduced-precision LLM work emphasizes robustness across seeds and hyperparameters, and the current project has only one smoke seed."
    why_it_matters: "The pilot should avoid treating tiny validation-loss differences as meaningful if they are within seed noise. This hypothesis makes variance estimation part of the scientific method."
    expected_result: "Across three seeds, fp32_norms and bf16_baseline have overlapping validation NLL distributions unless a stability event occurs in one policy but not the other."
    required_experiment: "Repeat H1 with seeds 42, 43, and 44 using the same data split procedure and compare mean, standard deviation, and per-seed paired deltas."
    metric: "Per-seed validation NLL delta, mean and standard deviation of validation NLL, loss-spike count, NaN/Inf count, and throughput overhead."
    estimated_compute_cost: "About 7.5 GPU-hours for three paired baseline/treatment runs at the observed smoke speed."
    risk: "Three seeds may still be underpowered, but more seeds may exceed the 2-week pilot budget."
    parent: null
    priority: medium
  - id: H5
    statement: "The current dtype probe is insufficient to prove internal compute dtype; instrumenting RMSNorm internals will reveal whether boundary bf16 tensors are reduced in bf16 or temporarily upcast during the actual RMSNorm calculation."
    status: completed_source_validated
    role_for_H6: "required_dtype_validity_check"
    motivation: "The survey identifies internal-versus-boundary dtype as a central evidence gap. The current probe observes module inputs, outputs, and parameters, but not reduction accumulator dtype."
    why_it_matters: "If Qwen RMSNorm internally upcasts despite bf16 boundaries, H1's treatment may be less meaningful. If it truly reduces in bf16, H1 is better motivated."
    expected_result: "Completed for the installed Qwen2RMSNorm implementation: the forward source casts hidden_states to float32 before pow/mean/rsqrt. The executed H5 probe ran on CPU because CUDA was unavailable, so it validated source/reference behavior rather than a live CUDA bf16 internal trace."
    required_experiment: "Add an RMSNorm-specific instrumentation or monkey-patched reference RMSNorm that logs dtype at square, mean, rsqrt, multiplication, and output steps for one forward pass, without training."
    metric: "Observed dtype at each RMSNorm internal operation, plus max absolute output difference between baseline and reference fp32 RMSNorm on the same activation sample."
    estimated_compute_cost: "Less than 10 minutes on one GPU or CPU; no training required."
    risk: "Monkey-patching may diverge from optimized/fused implementation details; results may be implementation-specific to the installed Transformers/PyTorch versions."
    parent: null
    priority: high
  - id: H6
    statement: "A short pre-training calibration pass can identify which model modules are precision-sensitive, enabling a frozen mixed-precision policy that matches bf16 LoRA validation quality while reducing resource cost or expanding the stable fine-tuning envelope."
    status: active
    plain_language_question: "Can we quickly test a model before fine-tuning, find the fragile parts, and spend high precision only where it matters?"
    motivation: "H1 showed that a hand-picked fp32 normalization island is a weak intervention for Qwen LoRA, partly because Qwen2RMSNorm already upcasts internally. The broader research direction is therefore to replace hand-written dtype rules with a simple measured calibration step."
    why_it_matters: "If precision can be assigned from a short check rather than intuition, limited-GPU LoRA fine-tuning can become more systematic: sensitive modules stay safe, tolerant modules become resource-saving candidates, and stable-envelope claims can be tested directly."
    expected_result: "The calibration-derived policy identifies high-risk modules that should stay bf16/fp32 and low-risk projection modules that can be tested as lower-precision candidates. A successful frozen policy matches bf16 validation NLL within 1%, does not increase instability events, and either improves resource use or survives a stronger stress setting than bf16."
    required_experiment: "Run a quick calibration pass before training, collect per-module sensitivity signals and one-island perturbation loss deltas, freeze a policy, then compare that policy against bf16_baseline and the weak fp32_norms static anchor. H2, H3, and H4 remain conditional ablations used only if the policy needs a stronger static anchor, a stressed regime, or variance confirmation."
    metric: "Primary: final validation NLL delta versus bf16_baseline after fixed-step LoRA training. Secondary: loss-spike count, NaN/Inf count, max grad norm, per-module activation outlier score, fake-quantization error, perturbation loss delta, clipping/saturation rate, peak CUDA memory, tokens/sec, and policy decision trace."
    estimated_compute_cost: "About 1 GPU-hour for instrumentation and calibration smokes, then 2-5 GPU-hours for matched 500- to 1,000-step comparisons depending on how many candidate policies are retained."
    risk: "Per-module signals may be noisy at small scale, lower-precision kernels may not produce real speedups on the RTX 4050, and aggressive candidates such as int4 attention softmax may be numerically invalid during training."
    parent: null
    dependencies:
      - H1
      - H5
    optional_ablation_hypotheses:
      - H2
      - H3
      - H4
    priority: high

