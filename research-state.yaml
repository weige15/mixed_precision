  last_reflection: "The refreshed literature phase strengthens H6: the closest external template is adaptive subbyte LLM training with activation, gradient, optimizer-state, loss-divergence, and update-divergence signals. The first local H6 signal-only smoke confirms that per-module outlier and fake-quantization probes can produce a frozen policy trace. It is still too small and fp32-only to support an adaptive policy; the next methodological gap is a fuller bf16 calibration across all candidate modules plus perturbation loss-delta checks before freezing a policy for matched training."

